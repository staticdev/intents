language: zh-CN
responses:
  intents:
    HassGetCurrentTime:
      default: >
        {% set minute_str = '{0:02d}'.format(slots.time.minute) %}
        {% set hour = slots.time.hour %}
        {% if hour == 0 %}
        凌晨12点{{ minute_str }}分
        {% elif hour < 5 %}
        凌晨{{ hour }}点{{ minute_str }}分
        {% elif hour < 8 %}
        早上{{ hour }}点{{ minute_str }}分
        {% elif hour < 12 %}
        上午{{ hour }}点{{ minute_str }}分
        {% elif hour == 12 %}
        中午12点{{ minute_str }}分
        {% elif hour < 18 %}
        下午{{ hour - 12 }}点{{ minute_str }}分
        {% elif hour < 20 %}
        傍晚{{ hour - 12 }}点{{ minute_str }}分
        {% else %}
        晚上{{ hour - 12 }}点{{ minute_str }}分
        {% endif %}
