language: th
responses:
  intents:
    HassGetWeather:
      default: >
        {% set weather_condition = {
          'clear': 'และท้องฟ้าแจ่มใส',
          'clear-night': 'และท้องฟ้าแจ่มใส',
          'cloudy': 'และมีเมฆมาก',
          'exceptional': 'และอากาศผิดปกติ',
          'fog': 'และมีหมอก',
          'hail': 'และมีลูกเห็บ',
          'lightning': 'และมีฟ้าผ่า',
          'lightning-rainy': 'และมีฝนฟ้าคะนอง',
          'partlycloudy': 'และมีเมฆบางส่วน',
          'pouring': 'และฝนตกหนัก',
          'rainy': 'และฝนตก',
          'snowy': 'และหิมะตก',
          'snowy-rainy': 'และมีหิมะปนฝน',
          'sunny': 'และแดดออก',
          'windy': 'และลมแรง',
          'windy-variant': 'และลมแรงมีเมฆ'
        } %}
        {{ state.attributes.get('temperature') }} {{ state.attributes.get('temperature_unit') }} {{ weather_condition.get((state.state | string).lower(), "") }}
