language: cy
responses:
  intents:
    HassGetCurrentTime:
      default: >
        {% set minute_str = '{0:02d}'.format(slots.time.minute) %}

        {% if slots.time.hour == 0: %}
        12:{{ minute_str }} Y Bore
        {% elif slots.time.hour < 12: %}
        {{ slots.time.hour }}:{{ minute_str }} Y Bore
        {% elif slots.time.hour == 12: %}
        12:{{ minute_str }} Yr Hwyr
        {% else: %}
        {{ slots.time.hour - 12 }}:{{ minute_str }} Yr Hwyr
        {% endif %}
