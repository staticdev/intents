language: cy
responses:
  intents:
    HassGetWeather:
      default: >
        {% set weather_condition = {
          'clear': 'ac yn glir',
          'clear-night': 'ac yn glir',
          'cloudy': 'ac yn gymylog',
          'exceptional': 'ac yn eithriadol',
          'fog': 'gyda niwl',
          'hail': 'gyda chesair',
          'lightning': 'gyda mellt',
          'lightning-rainy': 'gyda mellt a glaw',
          'partlycloudy': 'a chymylog yn rhannol',
          'pouring': 'a glaw trwm',
          'rainy': 'ac yn glawio',
          'snowy': 'ac yn bwrw eira',
          'snowy-rainy': 'gydag eira a glaw',
          'sunny': 'ac yn heulog',
          'windy': 'ac yn wyntog',
          'windy-variant': 'gyda gwynt a chymylau'
        } %}
        {{ state.attributes.get('temperature') }} {{ state.attributes.get('temperature_unit') }} {{ weather_condition.get((state.state | string).lower(), "") }}
