language: zh-CN
intents:
  HassGetState:
    data:
      - sentences:
          - "<name>[<current>](是|是不是|是否){cover_states:state}[的][吗]"
        response: cover_one_yesno
        requires_context:
          domain: cover
        slots:
          domain: cover

      - sentences:
          - "[<area>](有|有没有|有任何){cover_classes:device_class}(是|处于){cover_states:state}[的][吗]"
          - "(有|有没有|有任何)<area>{cover_classes:device_class}(是|处于){cover_states:state}[的][吗]"
          - "[<area>]{cover_classes:device_class}(有|有没有){cover_states:state}[的][吗]"
        response: cover_any
        slots:
          domain: cover

      - sentences:
          - "[<area>][<all>]{cover_classes:device_class}(都是|都|是不是都|是否都){cover_states:state}[的][吗]"
          - "<all><area>{cover_classes:device_class}(都是|都|是不是都|是否都){cover_states:state}[的][吗]"
        response: cover_all
        slots:
          domain: cover

      - sentences:
          - "[<area>]<which>{cover_classes:device_class}(是|处于){cover_states:state}[的]"
          - "<which>[<area>]{cover_classes:device_class}(是|处于){cover_states:state}[的]"
        response: cover_which
        slots:
          domain: cover

      - sentences:
          - "[<area>]<how_many_is>{cover_classes:device_class}(是|处于){cover_states:state}[的]"
          - "<how_many_is>[<area>]{cover_classes:device_class}(是|处于){cover_states:state}[的]"
        response: cover_how_many
        slots:
          domain: cover
