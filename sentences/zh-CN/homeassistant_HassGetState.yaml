language: zh-CN
intents:
  HassGetState:
    data:
      - sentences:
          - "[<area>]<name>[<current>][的]状态(是什么|怎么样|如何|是几|是多少)"
          - "[<area>]<name>[<current>]状态"
          - "[<area>]<name>[<current>](什么状态|啥状态)"
        response: one
        excludes_context:
          domain:
            - scene
            - script
            - person
            - lock
            - climate
            - binary_sensor

      - sentences:
          - "[<area>]{name}[<current>](是不是|是否){on_off_states:state}[的][吗]"
          - "[<area>]{name}[<current>][是]{on_off_states:state}[吗|不]"
          - "[<area>]{name}[<current>](处于|在){on_off_states:state}[状态][吗]"
        response: one_yesno
        excludes_context:
          domain:
            - cover
            - lock
            - binary_sensor

      - sentences:
          - "[<area>](有|有没有){on_off_domains:domain}(是|处于){on_off_states:state}[的][吗]"
          - "(有|有没有)<area>{on_off_domains:domain}(是|处于){on_off_states:state}[的][吗]"
          - "[<area>]{on_off_domains:domain}(有|有没有){on_off_states:state}[的][吗]"
          - "[<area>](有|有没有){on_off_domains:domain}{on_off_states:state}[吗]"
          - "[<area>]{on_off_domains:domain}(有|有没有){on_off_states:state}[吗]"
        response: any

      - sentences:
          - "[<area>][<all>]{on_off_domains:domain}(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
          - "<all><area>{on_off_domains:domain}(都是|都|是不是都|是否都){on_off_states:state}[的][吗]"
        response: all

      - sentences:
          - "[<area>]<which>{on_off_domains:domain}(是|处于){on_off_states:state}[的]"
          - "<which>[<area>]{on_off_domains:domain}(是|处于){on_off_states:state}[的]"
          - "<area>{on_off_domains:domain}<which>(是|处于){on_off_states:state}[的]"
        response: which

      - sentences:
          - "[<area>]<how_many_is>{on_off_domains:domain}(是|处于){on_off_states:state}[的]"
          - "<how_many_is>[<area>]{on_off_domains:domain}(是|处于){on_off_states:state}[的]"
          - "<area>{on_off_domains:domain}<how_many_is>(是|处于){on_off_states:state}[的]"
        response: how_many
