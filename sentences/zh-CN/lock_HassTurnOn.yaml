language: zh-CN
intents:
  HassTurnOn:
    data:
      - sentences:
          - "给[<area>]{name}[上锁]"
          - "(关上|锁上|上锁)[<area>]{name}[的锁]"
          - "锁上[<area>]{name}[的锁]"
          - "[<let>][把][<area>]{name}[[的]锁](关上|上锁)"
          - "[<let>][把][<area>]{name}(锁上|上锁)"
        requires_context:
          domain: lock
        response: lock

      - sentences:
          - "(关闭|关上|锁上|上锁)<area>[的][<all>](门|门锁)"
          - "给<area>[的][<all>](门|门锁)上锁"
          - "锁上<area>[的][<all>](门|门锁)"
          - "[<let>][把]<area>[的][<all>](门|门锁)[都](锁上|上锁)"
          - "<area>[的][<all>](门|门锁)(都|全部)(锁上|上锁)"
        slots:
          domain: lock
        response: lock

      - sentences:
          - "(关闭|关上|锁上|上锁)<home>[的][<all>](门|门锁)"
          - "给<home>[的][<all>](门|门锁)上锁"
          - "锁上<home>[的][<all>](门|门锁)"
          - "[<let>][把]<home>[的][<all>](门|门锁)[都](锁上|上锁)"
          - "<home>[的][<all>](门|门锁)(都|全部)(锁上|上锁)"
        slots:
          domain: lock
          name: all
        response: lock_all
