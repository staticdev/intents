language: zh-CN
intents:
  HassSetVolumeRelative:
    data:
      - sentences:
          - "[<let>]音量调高"
          - "[<let>]声音调大"
          - "音量大一点"
        slots:
          volume_step: "up"
        requires_context:
          area:
            slot: true
      - sentences:
          - "[<let>]音量调高<volume_step>"
          - "[<let>]声音调大<volume_step>"
          - "音量提高<volume_step>"
        expansion_rules:
          volume_step: "({volume_step_up:volume_step}|{volume_step_up:volume_step}%|百分之{volume_step_up:volume_step}|{volume_step_up:volume_step}个百分点|{volume_step_up:volume_step}点)"
        requires_context:
          area:
            slot: true
      - sentences:
          - "[<let>]音量调低"
          - "[<let>]声音调小"
          - "音量小一点"
        slots:
          volume_step: "down"
        requires_context:
          area:
            slot: true
      - sentences:
          - "[<let>]音量调低<volume_step>"
          - "[<let>]声音调小<volume_step>"
          - "音量降低<volume_step>"
        expansion_rules:
          volume_step: "({volume_step_down:volume_step}|{volume_step_down:volume_step}%|百分之{volume_step_down:volume_step}|{volume_step_down:volume_step}个百分点|{volume_step_down:volume_step}点)"
        requires_context:
          area:
            slot: true

      - sentences:
          - "<name>音量调高"
          - "把<name>声音调大"
          - "让<name>音量大一点"
        slots:
          volume_step: "up"
        requires_context:
          domain: media_player
      - sentences:
