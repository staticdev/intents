language: zh-CN
intents:
  HassGetState:
    data:
      # https://www.home-assistant.io/integrations/binary_sensor/
      - sentences:
          - "[<area>]<name>电量{bs_battery_states:state}[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: battery
        slots:
          domain: binary_sensor
          device_class: battery

      - sentences:
          - "[<area>]<name>[<current>][正在]{bs_battery_charging_states:state}[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: battery_charging
        slots:
          domain: binary_sensor
          device_class: battery_charging

      - sentences:
          - "[<area>][有][没有]{bs_carbon_monoxide_states:state}[到](一氧化碳|CO2|<name>)[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: carbon_monoxide
        slots:
          domain: binary_sensor
          device_class: carbon_monoxide

      - sentences:
          - "[<area>]<name>[<current>][是]{bs_cold_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: cold
        slots:
          domain: binary_sensor
          device_class: cold

      - sentences:
          - "[<area>]<name>[<current>][是]{bs_connectivity_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: connectivity
        slots:
          domain: binary_sensor
          device_class: connectivity

      - sentences:
          - "[<area>]<name>[<current>][是]{bs_door_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
