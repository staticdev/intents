      - sentences:
          - "[<area>]<name>[<current>][是]{bs_plug_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: plug
        slots:
          domain: binary_sensor
          device_class: plug

      - sentences:
          - "[<area>]<name>[<current>][是]{bs_power_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
