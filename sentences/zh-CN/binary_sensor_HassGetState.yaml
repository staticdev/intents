      - sentences:
          - "[<area>]<name>[<current>][是]{bs_moisture_states:state}[的吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: moisture
        slots:
          domain: binary_sensor
          device_class: moisture

      - sentences:
          - "[<area>][的]<name>[有][没有]{bs_motion_states:state}[到]动作[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: motion
