      - sentences:
          - "[<area>][有][没有]{bs_gas_states:state}[到](天然气|瓦斯|<name>)[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: gas
        slots:
          domain: binary_sensor
          device_class: gas

      - sentences:
          - "[<area>]<name>[有]{bs_heat_states:state}[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: heat
        slots:
          domain: binary_sensor
          device_class: heat

      - sentences:
          - "[<area>][有][没有]{bs_light_states:state}[到](光线|<name>)[吗]"
        response: bs_one_yesno
        requires_context:
          domain: binary_sensor
          device_class: light
