      - sentences:
          - "[<area>][有][没有][任何]烟雾[吗]"
        response: bs_any
        slots:
          domain: binary_sensor
          device_class: smoke
          state: "on"

      - sentences:
          - "[<area>][有][没有]{bs_sound_states:state}[到]<name>[的]声音[吗]"
        response: bs_one_yesno
