language: zh-CN
intents:
  HassTimerStatus:
    data:
      # 通用状态查询
      - sentences:
          - "<timer><status>"
          - "计时器还有多久"
          - "计时器还剩多长时间"
          - "计时器还剩多少时间"
          - "计时器怎么样了"
          - "看看计时器"
          - "定时器<status>"
          - "倒计时还有多久"
          - "倒计时还剩多长时间"

      # 区域计时器查询
      - sentences:
          - "{area}<timer><status>"
          - "{area}计时器还有多久"
          - "{area}计时器还剩多长时间"
          - "看看{area}计时器"
        slots:
          area:
            wildcard: true

      # 名称计时器查询
      - sentences:
          - "{timer_name:name}<timer><status>"
          - "{timer_name:name}计时器还有多久"
          - "{timer_name:name}计时器还剩多长时间"
          - "看看{timer_name:name}计时器"
