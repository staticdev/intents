language: zh-CN
intents:
  HassTurnOn:
    data:
      # 按灯具名称打开
      - sentences:
          - "<turn_on><name>"
          - "[<let>][把]<name><turn_on>"
          - "[<let>][把]<name>打开"
        slots:
          domain: light
        requires_context:
          domain: light

      # 按区域打开
      - sentences:
          - "<turn_on><area><light>"
          - "[<let>][把]<area><light><turn_on>"
          - "[<let>][把]<area><light>打开"
        slots:
          domain: light
        response: lights_area

      # 全屋打开
      - sentences:
          - "<turn_on><home>[的]<all>(灯|吸顶灯|筒灯|射灯|台灯|床头灯|灯光)"
          - "[<let>][把]<home>[的]<all>(灯|吸顶灯|筒灯|射灯|台灯|床头灯|灯光)<turn_on>"
          - "[<let>][把]<home>[的]<all>(灯|吸顶灯|筒灯|射灯|台灯|床头灯|灯光)打开"
        slots:
          domain: light
          name: all
        response: lights_all

      # 当前区域（requires_context.area）
      - sentences:
          - "<turn_on>这里的<light>"
          - "[<let>][把]这里的<light><turn_on>"
          - "[<let>][把]这里的<light>打开"
          - "[<let>][把]<all><light><turn_on>"
        slots:
          domain: light
        response: lights_area
        requires_context:
          area:
            slot: true
