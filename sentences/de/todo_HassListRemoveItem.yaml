language: "de"
intents:
  HassListRemoveItem:
    data:
      - sentences:
          - (entferne|lösch[e]) <item> (von|auf|aus) <meine_liste_dativ>
          - lösch[e] <item> aus <meine_liste_dativ> raus
          - lösch[e] <item> von <meine_liste_dativ> runter
          - <item> (von|auf|aus) <meine_liste_dativ> (entfernen|löschen)
        response: item_deleted
        requires_context:
          domain: todo
        expansion_rules:
          item: "{todo_list_item:item}"
