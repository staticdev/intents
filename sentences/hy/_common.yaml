lists:
  color:
    values:
      - in: "սպիտակ"
        out: "white"
      - in: "վարդագույն"
        out: "crimson"
      - in: "կարմիր"
        out: "red"
      - in: "նարնջագույն"
        out: "orange"
      - in: "դեղին"
        out: "goldenrod"
      - in: "կանաչ"
        out: "green"
      - in: "(երկնագույն|բաց կապույտ)"
        out: "skyblue"
      - in: "կապույտ"
        out: "blue"
      - in: "մանուշակագույն"
        out: "purple"

  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  on_off_states:
    values:
      - in: "(միացված[ է| են])"
        out: "on"
      - in: "(անջատված[ է| են])"
        out: "off"
  on_off_domains:
    values:
      - in: "(լույս[ը|եր|երը]|լուսավորություն[ը]|լամպ[ը|եր|երը]|լուսատու[ն|ներ|ները])"
        out: light
      - in: "օդափոխիչ[ը|ներ|ները]"
        out: fan
      - in: "անջատիչ[ը|ներ|ները]"
        out: switch
  cover_states:
    values:
      - in: "(բաց[ված]|բարձրացված)"
        out: "open"
      - in: "(փակ[ված]|իջեցված|ծածկված)"
        out: "closed"
      - in: "(բացվում [է|են]|բարձրանում [է|են])"
        out: "opening"
      - in: "(փակվում [է|են]|իջնում [է|են])"
        out: "closing"
  cover_classes:
    values:
      - in: "ծածկ[եր|երը]"
        out: "awning"
      - in: "շերտավարագույր[ներ|ները|ներն]"
        out: "blind"
      - in: "վարագույր[ներ|ները|ներն]"
        out: "curtain"
      - in: "(փական[ներ|ները]|կափույր[ներ|ները])"
        out: "damper"
      - in: "(դուռ[ը]|դռներ[ը]|դռնակ[ը|ներ|ները])"
        out: "door"
      - in: "ավտոտնակի (դուռ[ը]|դռներ[ը]|դարպաս[ը|ներ|ները])"
        out: "garage"
      - in: "դարպաս[ը|ներ|ները]"
        out: "gate"
      - in: "գլանավարագույր[ներ|ները]"
        out: "shade"
      - in: "փեղկ[եր|երը]"
        out: "shutter"
      - in: "պատուհան[ը|ներ|ները]"
        out: "window"

  # binary_sensor
  bs_battery_states:
    values:
      - in: "(լիցքաթափված|նստած)"
        out: "on"
      - in: "(լիցքավորված|լիքը|նորմալ)"
        out: "off"

  bs_battery_charging_states:
    values:
      - in: "(լիցքավորվում է|լիցքավորման վրա է|լիցքավորման տակ է)"
        out: "on"
      - in: "(չի լիցքավորվում|լիցքաթափվում է)"
        out: "off"

  bs_carbon_monoxide_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|միացված[ է| են]|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|անջատված[ է| են]|չի ակտիվացված)"
        out: "off"

  bs_cold_states:
    values:
      - in: "(սառը|պաղ)"
        out: "on"
      - in: "(նորմալ|սովորական)"
        out: "off"

  bs_connectivity_states:
    values:
      - in: "(միացված[ է| են]|կապակցված[ է| են]|միացել է)"
        out: "on"
      - in: "(անջատված[ է| են]|չկապակցված[ է| են]|կապ չկա)"
        out: "off"

  bs_door_states:
    values:
      - in: "բաց[ված]"
        out: "on"
      - in: "փակ[ված]"
        out: "off"

  bs_garage_door_states:
    values:
      - in: "բաց[ված]"
        out: "on"
      - in: "փակ[ված]"
        out: "off"

  bs_gas_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|միացված[ է| են]|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|անջատված[ է| են]|չի ակտիվացված)"
        out: "off"

  bs_heat_states:
    values:
      - in: "(տաք|շոգ)"
        out: "on"
      - in: "նորմալ"
        out: "off"

  bs_light_states:
    values:
      - in: "(հայտնաբերված[ է| են]|առկա է|ակտիվացված[ է| են])"
        out: "on"
      - in: "(չի հայտնաբերված|բացակայում է|չի ակտիվացված)"
        out: "off"

  bs_lock_states:
    values:
      - in: "(բաց[ված]|չկողպված|ապակողպված)"
        out: "on"
      - in: "(փակ[ված]|կողպված|փակած)"
        out: "off"

  bs_moisture_states:
    values:
      - in: "(թաց|խոնավ|ակտիվացված[ է| են]|աշխատել է)"
        out: "on"
      - in: "(չոր)"
        out: "off"

  bs_motion_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|շարժում կա|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|շարժում չկա|չի ակտիվացված)"
        out: "off"

  bs_occupancy_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|զբաղված|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|ազատ|չի ակտիվացված)"
        out: "off"

  bs_opening_states:
    values:
      - in: "(բաց[ված]|աշխատել է|ակտիվացված[ է| են])"
        out: "on"
      - in: "(փակ[ված])"
        out: "off"

  bs_plug_states:
    values:
      - in: "(միացված[ է| են]|խրված է)"
        out: "on"
      - in: "(անջատված[ է| են]|հանված է)"
        out: "off"

  bs_power_states:
    values:
      - in: "(միացված[ է| են]|հոսանք կա)"
        out: "on"
      - in: "(անջատված[ է| են]|հոսանք չկա)"
        out: "off"

  bs_presence_states:
    values:
      - in: "(տանը|առկա[ է| են])"
        out: "on"
      - in: "(տանը չէ|տանը չեն|բացակա[ է| են])"
        out: "off"

  bs_problem_states:
    values:
      - in: "(հայտնաբերված[ է| են]|խնդիր կա)"
        out: "on"
      - in: "(օք|նորմալ|խնդիր չկա)"
        out: "off"

  bs_running_states:
    values:
      - in: "(աշխատում[ է| են]|միացված[ է| են]|միացրած)"
        out: "on"
      - in: "(չի աշխատում|կանգնած[ է| են]|անջատված[ է| են])"
        out: "off"

  bs_safety_states:
    values:
      - in: "վտանգավոր"
        out: "on"
      - in: "անվտանգ"
        out: "off"

  bs_smoke_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|ծուխ կա|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|չի ակտիվացված)"
        out: "off"

  bs_sound_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|ձայն կա|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|չի ակտիվացված)"
        out: "off"

  bs_tamper_states:
    values:
      - in: "(հայտնաբերված[ է| են]|ակտիվացված[ է| են]|միջամտություն կա|աշխատել է)"
        out: "on"
      - in: "(չի հայտնաբերված|չի ակտիվացված)"
        out: "off"

  bs_update_states:
    values:
      - in: "(հասանելի է|թարմացում կա)"
        out: "on"
      - in: "(թարմացված է|up-to-date|նորմալ է)"
        out: "off"

  bs_vibration_states:
    values:
      - in: "(հայտնաբերված[ է| են]|վիբրացիա կա|վիբրացնում է)"
        out: "on"
      - in: "(չի վիբրացնում|վիբրացիա չկա)"
        out: "off"

  bs_window_states:
    values:
      - in: "բաց[ված]"
        out: "on"
      - in: "փակ[ված]"
        out: "closed"

  shopping_list_item:
    wildcard: true

  position:
    range:
      type: "percentage"
      from: 0
      to: 100

  volume:
    range:
      type: "percentage"
      from: 0
      to: 100

  timer_seconds:
    range:
      from: 1
      to: 100
  timer_minutes:
    range:
      from: 1
      to: 100
  timer_hours:
    range:
      from: 1
      to: 100
  timer_name:
    wildcard: true
  timer_command:
    wildcard: true

  message:
    wildcard: true

expansion_rules:
  name: "{name}"
  area: "{area}[ում]"
  brightness: "{brightness}[ %| տոկոս]"
  temp: "(ջերմաստիճան[ը]|աստիճան[ը])"
  temperature: "{temperature}[ °| աստիճան]"
  turn_on: "(միացրու|միացնել|միացրեք)"
  turn_off: "(անջատիր|անջատել|անջատեք)"
  set: "(դիր|սահմանիր|դրեք|փոխիր|փոխել|բարձրացրու|իջեցրու|ավելացրու|պակասեցրու|տեղադրիր)"
  close: "(փակիր|փակել|փակեք|իջեցրու|իջեցնել)"
  open: "(բացիր|բացել|բացեք|բարձրացրու|բարձրացնել)"
  what_is: "(ի՞նչ|ինչ|որքա՞ն|որքան|քանի՞|քանի|ե՞րբ|երբ|ինչպե՞ս|ինչպես)"
  what_is_the_class_of_name: "<what_is> [է ]<class>[ի] [ցուցանիշը|արժեքը|մակարդակը|կարգավիճակը] <name>[ի] [վրա ][<area>]"
  position: "{position}[ %| տոկոս]"
  volume: "{volume:volume_level}[ %| տոկոս]"
  # Timers
  timer_duration_seconds: "{timer_seconds:seconds} վայրկյան"
  timer_duration_minutes: "{timer_minutes:minutes} րոպե[ [և ]{timer_seconds:seconds} վայրկյան]"
  timer_duration_hours: "{timer_hours:hours} ժամ[ [և ]{timer_minutes:minutes} րոպե][ [և ]{timer_seconds:seconds} վայրկյան]"
  timer_duration: "<timer_duration_seconds>|<timer_duration_minutes>|<timer_duration_hours>"

  timer_start_seconds: "{timer_seconds:start_seconds} վայրկյան"
  timer_start_minutes: "{timer_minutes:start_minutes} րոպե[ [և ]{timer_seconds:start_seconds} վայրկյան]"
  timer_start_hours: "{timer_hours:start_hours} ժամ[ [և ]{timer_minutes:start_minutes} րոպե][ [և ]{timer_seconds:start_seconds} վայրկյան]"
  timer_start: "<timer_start_seconds>|<timer_start_minutes>|<timer_start_hours>"
skip_words:
  - "խնդրում եմ"
  - "կարող ես"
  - "կարող եք"
  - "ասա"
  - "ասեք"
  - "ստուգիր"
  - "իմացիր"
