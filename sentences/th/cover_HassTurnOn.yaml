language: th
intents:
  HassTurnOn:
    data:
      - sentences:
          - "[<polite_prefix>]เปิด{name}[<area>][<polite_suffix>]"
        requires_context:
          domain: cover
        response: cover

      - sentences:
          - "[<polite_prefix>]เปิดประตูโรงรถ[<polite_suffix>]"
        slots:
          domain: cover
          device_class: garage
        response: cover_device_class

      - sentences:
          - "[<polite_prefix>]เปิด{cover_classes:device_class}<area>[<polite_suffix>]"
        slots:
          domain: cover
        response: cover_device_class

      - sentences:
          - "[<polite_prefix>]เปิด{cover_classes:device_class}[<here>][<polite_suffix>]"
        slots:
          domain: cover
        response: cover_device_class
        requires_context:
          area:
            slot: true
