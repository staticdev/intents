          - "<second_person>(ฟัง|บันทึกเสียง)ตลอดเวลา(ไหม|หรือเปล่า|รึเปล่า|ใช่ไหม)"
          - "<second_person>แอบฟังตลอดเวลา(ไหม|หรือเปล่า|รึเปล่า|ใช่ไหม)"
