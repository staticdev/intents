---
# HassTurnOn - area_domain
# example: turn on the lights in the kitchen
# slots: {area}

language: "th"

data:
  - sentences:
      - "เปิด[(ใช้|ใช้งาน)]ไฟ[(ทั้งหมด|ทุกดวง)]<area>"
      - "เปิด[(ใช้|ใช้งาน)]ไฟ<area>[(ทั้งหมด|ทุกดวง)]"
      - "(ปรับ|เปลี่ยน)ไฟ<area>[(ทั้งหมด|ทุกดวง)]<to>(เปิด|ทำงาน)"
    inferred_domain: "light"
    response: "lights_area"
