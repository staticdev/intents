---
# HassTurnOn - name_only
# example: turn on the overhead light
# slots: {name}

language: "th"
data:
  - sentences:
      - "เปิด[(ใช้|ใช้งาน)]{name}"
      - "(ปรับ|เปลี่ยน){name}<to>(เปิด|ทำงาน)"
    name_domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"
      - "cover"
      - "valve"
    response: "default"
