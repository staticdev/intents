language: th
intents:
  HassGetState:
    data:
      - sentences:
          - "[ตอนนี้]<area>ชื้นไหม[<polite_suffix>]"
          - "[ตอนนี้]{area}ชื้นไหม[<polite_suffix>]"
          - "[ตอนนี้]{area} ชื้นไหม[<polite_suffix>]"
          - "[ตอนนี้]<area>ชื้นแค่ไหน[<polite_suffix>]"
          - "[ตอนนี้]{area}ชื้นแค่ไหน[<polite_suffix>]"
          - "[ตอนนี้]{area} ชื้นแค่ไหน[<polite_suffix>]"
          - "[ตอนนี้]ความชื้น<area>[<polite_suffix>]"
          - "[ตอนนี้]ความชื้นของ<area>[<polite_suffix>]"
          - "[ตอนนี้]ความชื้น{area}[<polite_suffix>]"
          - "[ตอนนี้]ความชื้นของ{area}[<polite_suffix>]"
          - "[ตอนนี้]ความชื้น<area>เท่า(ไร|ไหร่)[<polite_suffix>]"
          - "[ตอนนี้]ความชื้น<area>เป็นไง[บ้าง][<polite_suffix>]"
          - "[ตอนนี้]<area>ความชื้นเป็นไง[บ้าง][<polite_suffix>]"
          - "[ตอนนี้]{area} ความชื้นเป็นไง[บ้าง][<polite_suffix>]"
