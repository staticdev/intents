        slots:
          domain: sensor
          device_class: humidity

      - sentences:
          - ค่าของ{name}คืออะไร
          - ค่า{name}คืออะไร
          - "{name}เท่า(ไร|ไหร่)"
          - ตอนนี้{name}เท่า(ไร|ไหร่)
          - "{name}ตอนนี้เท่า(ไร|ไหร่)"
          - "{name}อยู่ที่เท่า(ไร|ไหร่)"
          - ตอนนี้ค่าของ{name}คืออะไร
          - "[<polite_prefix>](ดู|บอก){name}[<polite_suffix>]"
          - "[<polite_prefix>](ดู|บอก)ค่า{name}[<polite_suffix>]"
        response: one
        slots:
          domain: sensor
        requires_context:
          domain: sensor
