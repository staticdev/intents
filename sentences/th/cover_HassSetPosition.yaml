language: th
intents:
  HassSetPosition:
    data:
      - sentences:
          - "[<polite_prefix>]<set>{name}<to>{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]<set>ตำแหน่ง[ของ]{name}<to>{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]ตั้งตำแหน่งของ{name}เป็น{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]ปรับตำแหน่งของ{name}เป็น{position}[<percent>][<polite_suffix>]"
