          - "[<polite_prefix>]<set>ตำแหน่ง{cover_classes:device_class}<area><to>{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]<set>{cover_classes:device_class}<floor><to>{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]<set>ตำแหน่ง{cover_classes:device_class}<floor><to>{position}[<percent>][<polite_suffix>]"
        slots:
          domain: cover

      - sentences:
          - "[<polite_prefix>]<set>{cover_classes:device_class}[<here>]<to>{position}[<percent>][<polite_suffix>]"
          - "[<polite_prefix>]<set>ตำแหน่ง{cover_classes:device_class}[<here>]<to>{position}[<percent>][<polite_suffix>]"
