      - ประตูหน้าล็อกหรือเปล่า
      - ขณะนี้สถานะของประตูหน้าเป็นล็อกไหม
      - ประตูหน้าล็อกอยู่รึเปล่า
      - ขณะนี้ประตูหน้าล็อกใช่ไหม
      - ประตูหน้าล็อกรึเปล่า
    intent:
      name: HassGetState
      context:
        domain: lock
      slots:
        domain: lock
        name: ประตูหน้า
        state: locked
    response: ใช่
  - sentences:
