      - มีประตูที่ปลดล็อกอยู่รึเปล่า
      - ขณะนี้มีประตูปลดล็อกอยู่ไหม
    intent:
      name: HassGetState
      slots:
        domain: lock
        state: unlocked
    response: ใช่, ประตูหลัง
  - sentences:
