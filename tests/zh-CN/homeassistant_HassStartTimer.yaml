language: zh-CN
tests:
  # 模板：通用计时器
  - sentences:
      - "设置10分钟后开始计时器"
      - "设置10分钟计时器"
      - "计时器设置10分钟"
    intent:
      name: HassStartTimer
      slots:
        minutes: 10
    response: 好的，已开始计时

  # 模板：指定名称计时器
  - sentences:
      - "设置煮面计时器10分钟"
      - "设置10分钟的煮面计时器"
      - "煮面计时器设置10分钟"
    intent:
      name: HassStartTimer
      slots:
        name: 煮面
        minutes: 10
    response: 好的，已开始计时
