language: zh-CN
tests:
  # 按设备名
  - sentences:
      - "TV下一台"
      - "TV下一首"
      - "TV下一曲"
      - "TV切到下一首"
    intent:
      name: HassMediaNext
      slots:
        name: "TV"
    response: "好的，已切换到下一首"

  # 当前区域（依赖上下文）
  - sentences:
      - "下一曲"
      - "下一首"
      - "下一台"
      - "切到下一首"
    intent:
      name: HassMediaNext
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已切换到下一首"

  # 按区域名
  - sentences:
      - "客厅下一首"
      - "客厅下一曲"
      - "客厅下一台"
      - "在客厅切到下一首"
    intent:
      name: HassMediaNext
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已切换到下一首"
