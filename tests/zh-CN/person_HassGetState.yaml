language: zh-CN
tests:
  # 按人名查询位置
  - sentences:
      - "Nabu在哪"
      - "Nabu在哪里"
      - "Nabu现在在什么地方"
      - "Nabu人呢"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Nabu
    response: Nabu在家

  # 未知人名
  - sentences:
      - "张三在哪"
      - "张三在哪里"
      - "张三人呢"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: 张三
    response: 抱歉，我不知道张三在哪里
