language: zh-CN
tests:
  # 模板：按名称上锁
  - sentences:
      - "关上前门的锁"
      - "把前门的锁关上"
      - "给前门上锁"
      - "把前门锁上"
      - "锁上前门的锁"
      - "前门上锁"
    intent:
      name: HassTurnOn
      context:
        domain: lock
      slots:
        name: 前门
    response: "前门已上锁"

  # 模板：按区域上锁
  - sentences:
      - "关闭厨房的门锁"
      - "把厨房的门锁都上锁"
      - "给厨房门锁上锁"
      - "锁上厨房的门锁"
      - "厨房的门锁都锁上"
      - "厨房的门锁全部上锁"
    intent:
      name: HassTurnOn
      slots:
        area: 厨房
        domain: lock
    response: "已上锁"

  # 模板：全屋上锁
  - sentences:
      - "关闭家里所有的门锁"
      - "把家里所有的门锁都上锁"
      - "给全屋所有门锁上锁"
      - "锁上整个家里的门锁"
    intent:
      name: HassTurnOn
      slots:
        domain: lock
        name: all
    response: "所有门锁已上锁"
