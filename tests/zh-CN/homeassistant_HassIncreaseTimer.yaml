language: zh-CN
tests:
  # 模板：通用延长
  - sentences:
      - "计时器加5分钟"
      - "给计时器延长5分钟"
      - "给计时器再加5分钟"
      - "给计时器再5分钟"
    intent:
      name: HassIncreaseTimer
      slots:
        minutes: 5
    response: 好的，已延长计时器

  # 模板：按区域延长
  - sentences:
      - "给客厅计时器加5分钟"
      - "客厅计时器延长5分钟"
      - "给厨房计时器再加5分钟"
    intent:
      name: HassIncreaseTimer
      slots:
        area:
          - 客厅
          - 客厅
          - 厨房
        minutes: 5
    response: 好的，已延长计时器

  # 模板：按名称延长
  - sentences:
      - "煮面计时器加2分钟"
      - "给煮面计时器延长2分钟"
      - "给煮面计时器再加2分钟"
    intent:
      name: HassIncreaseTimer
      slots:
        name: 煮面
        minutes: 2
    response: 好的，已延长计时器
