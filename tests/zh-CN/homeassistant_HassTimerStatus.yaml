language: zh-CN
tests:
  # 模板：通用状态查询
  - sentences:
      - "计时器状态"
      - "计时器还有多久"
      - "计时器还剩多长时间"
      - "计时器还剩多少时间"
      - "计时器怎么样了"
      - "看看计时器"
      - "定时器状态"
      - "倒计时还有多久"
      - "倒计时还剩多长时间"
    intent:
      name: HassTimerStatus
    response: 最先结束的计时器还剩3分钟。

  # 模板：区域状态查询
  - sentences:
      - "厨房计时器状态"
      - "厨房计时器还有多久"
      - "厨房计时器还剩多长时间"
      - "看看厨房计时器"
    intent:
      name: HassTimerStatus
      slots:
        area: 厨房
    response: 计时器还剩3分钟。

  # 模板：名称状态查询
  - sentences:
      - "披萨计时器状态"
      - "披萨计时器还有多久"
      - "披萨计时器还剩多长时间"
      - "看看披萨计时器"
    intent:
      name: HassTimerStatus
      slots:
        name: 披萨
    response: 计时器还剩25分钟。
