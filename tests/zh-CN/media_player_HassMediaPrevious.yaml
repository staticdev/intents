language: zh-CN
tests:
  # 按设备名
  - sentences:
      - "TV上一曲"
      - "TV上一台"
      - "TV上一首"
      - "TV回到上一首"
    intent:
      name: HassMediaPrevious
      slots:
        name: "TV"
    response: "好的，已切换到上一首"

  # 当前区域（依赖上下文）
  - sentences:
      - "上一首"
      - "上一曲"
      - "上一台"
      - "回到上一首"
    intent:
      name: HassMediaPrevious
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已切换到上一首"

  # 按区域名
  - sentences:
      - "客厅上一曲"
      - "客厅上一首"
      - "客厅上一台"
      - "在客厅回到上一首"
    intent:
      name: HassMediaPrevious
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已切换到上一首"
