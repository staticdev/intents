language: zh-CN
tests:
  # 当前区域
  - sentences:
      - "把音量调高"
      - "声音调大"
      - "音量大一点"
    intent:
      name: HassSetVolumeRelative
      context:
        area: 客厅
      slots:
        area: 客厅
        volume_step: up
    response: "好的，已调整音量"
  - sentences:
      - "把音量调高20%"
      - "声音调大百分之二十"
      - "音量提高20"
    intent:
      name: HassSetVolumeRelative
      context:
        area: 客厅
      slots:
        area: 客厅
        volume_step: 20
    response: "好的，已调整音量"
