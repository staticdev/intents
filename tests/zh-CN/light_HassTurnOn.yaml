language: zh-CN
tests:
  # 模板：按灯具名称打开
  - sentences:
      - 打开易来吸顶灯
      - 把易来吸顶灯打开
      - 把易来吸顶灯开
    intent:
      name: HassTurnOn
      slots:
        name: 易来吸顶灯
        domain: light
      context:
        domain: light
    response: 易来吸顶灯已打开

  # 模板：按区域打开
  - sentences:
      - 打开卧室的灯
      - 把卧室的灯打开
      - 把卧室的灯开
    intent:
      name: HassTurnOn
      slots:
        area: 卧室
        domain: light
    response: 卧室灯已打开

  # 模板：当前区域（requires_context.area）
  - sentences:
      - 打开这里的灯
      - 把这里的灯打开
      - 把这里的灯开
      - 把所有灯打开
    intent:
      name: HassTurnOn
      context:
        area: 客厅
      slots:
        domain: light
        area: 客厅
    response: 客厅灯已打开

  # 模板：全屋打开
  - sentences:
      - 打开家里所有的灯
      - 把家里所有的灯打开
      - 把全屋所有灯打开
    intent:
      name: HassTurnOn
      slots:
        domain: light
        name: all
    response: 所有灯已打开
