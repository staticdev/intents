language: zh-CN
tests:
  # 按设备名
  - sentences:
      - "暂停TV"
      - "TV暂停"
      - "把TV暂停"
    intent:
      name: HassMediaPause
      slots:
        name: "TV"
    response: "好的，已暂停播放"

  # 当前区域（依赖上下文）
  - sentences:
      - "暂停"
      - "先暂停一下"
      - "暂停播放"
    intent:
      name: HassMediaPause
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已暂停播放"

  # 按区域名
  - sentences:
      - "暂停客厅的音乐"
      - "客厅暂停一下"
      - "把客厅的媒体播放器暂停"
    intent:
      name: HassMediaPause
      slots:
        area: "客厅"
      context:
        area: 客厅
    response: "好的，已暂停播放"
