language: zh-CN
tests:
  - sentences:
      - "你好家庭助手"
      - "嗨家庭助手"
      - "你好"
      - "在吗"
      - "家庭助手你好"
    intent:
      name: HassRespond
    response: 你好，我在呢。

  - sentences:
      - "你一直在监听吗"
      - "你是不是一直在听我说话"
      - "你会一直监听我吗"
      - "你总在听吗"
    intent:
      name: HassRespond
    response: 不会，只有你说出唤醒词后我才会开始监听。

  - sentences:
      - "我的数据去哪了"
      - "我的数据会发到哪里"
      - "我的语音数据发到哪里"
      - "数据会上传到哪里"
    intent:
      name: HassRespond
    response: 你的数据会发到你本地的 Home Assistant 服务器。

  - sentences:
      - "我能说什么"
      - "我可以问什么"
      - "我能让你做什么"
      - "你能帮我做什么"
    intent:
      name: HassRespond
    response: 你可以问我时间和天气，也可以让我控制家里的设备。

  - sentences:
      - "谁创造了你"
      - "你是谁做的"
      - "谁开发了你"
      - "你是谁开发的"
    intent:
      name: HassRespond
    response: 我是由 Home Assistant 社区一起打造的。
