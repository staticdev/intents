language: zh-CN
tests:
  # 模板：通用恢复
  - sentences:
      - "恢复计时器"
      - "把计时器继续"
      - "继续计时器"
    intent:
      name: HassUnpauseTimer
    response: 好的，已恢复计时器

  # 模板：带起始时长恢复
  - sentences:
      - "恢复10分钟的计时器"
    intent:
      name: HassUnpauseTimer
      slots:
        start_minutes: 10
    response: 好的，已恢复计时器

  # 模板：按区域恢复
  - sentences:
      - "恢复客厅计时器"
      - "把客厅计时器继续"
      - "继续厨房计时器"
    intent:
      name: HassUnpauseTimer
      slots:
        area:
          - 客厅
          - 客厅
          - 厨房
    response: 好的，已恢复计时器

  # 模板：按名称恢复
  - sentences:
      - "恢复煮面计时器"
      - "把煮面计时器继续"
      - "继续煮面计时器"
    intent:
      name: HassUnpauseTimer
      slots:
        name: 煮面
    response: 好的，已恢复计时器
