---
# HassLightSet - name_brightness
# example: állítsd a mennyezeti lámpa fényerejét 50%-ra
# slots:
# - {name}
# - {brightness}
# name domains: light

language: "hu"
entities:
  - name: "mennyezeti lámpa"
    domain: "light"

tests:
  - sentences:
      - "állítsd a mennyezeti lámpa fényerejét 50 százalékra"
      - "a mennyezeti lámpa fényerejét 50 százalékra"
    slots:
      name: "mennyezeti lámpa"
      brightness: 50
    response: "A lámpa fényereje beállítva"

  - sentences:
      - "Állítsd a mennyezeti lámpa fényerőt maximumra"
    slots:
      name: "mennyezeti lámpa"
      brightness: 100
    response: "A lámpa fényereje beállítva"

  - sentences:
      - "Állítsd a mennyezeti lámpa fényerőt minimumra"
    slots:
      name: "mennyezeti lámpa"
      brightness: 1
    response: "A lámpa fényereje beállítva"

  - sentences:
      - "állítsd a mennyezeti lámpa 50 százalékra"
    slots:
      name: "mennyezeti lámpa"
      brightness: 50
    response: "A lámpa fényereje beállítva"
